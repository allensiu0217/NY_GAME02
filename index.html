<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧨 新年金幣搶奪戰 🧨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #7f1d1d; /* 深紅色背景 */
            overflow: hidden;
            touch-action: none; /* 修改為 none，徹底阻止手機瀏覽器預設滑動與縮放 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* 禁用長按選單 */
        }

        /* 遊戲主視覺與動畫 */
        .tug-container {
            position: relative;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border: 4px solid #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .tug-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            transition: left 0.1s ease-out;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .player-zone {
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .player-zone:active {
            filter: brightness(1.2);
            transform: scale(0.98);
        }

        /* 煙火特效粒子 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fbbf24;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .pulse-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-white" oncontextmenu="return false;">

    <!-- 開始與結束覆蓋層 -->
    <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm">
        <h1 id="overlay-title" class="text-5xl md:text-7xl font-black text-yellow-400 mb-6 drop-shadow-lg text-center pulse-text">
            🧨 新年金幣搶奪戰 🧨
        </h1>
        <p id="overlay-desc" class="text-xl md:text-2xl text-red-200 mb-10 text-center max-w-lg px-4">
            把手機平放在桌上，雙方面對面狂點！<br>
            將代表福氣的金幣拉向自己！<br>
            <span class="text-sm md:text-base text-gray-400 mt-2 block">完全支援手機觸控，防誤觸優化版本</span>
        </p>
        <button onclick="startGame()" class="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-red-900 font-black text-3xl py-4 px-12 rounded-full shadow-[0_0_20px_rgba(251,191,36,0.8)] transform transition hover:scale-105 active:scale-95">
            開始對戰
        </button>
    </div>

    <!-- 玩家 1 區域 (上方，反轉 180 度適合對坐玩家) -->
    <div id="p1-zone" class="player-zone flex-1 w-full bg-gradient-to-b from-red-600 to-red-800 flex flex-col items-center justify-center relative border-b-4 border-yellow-500/50">
        <div class="text-center opacity-80 pointer-events-none rotate-180 flex flex-col items-center">
            <div class="text-7xl mb-2">🐉</div>
            <h2 class="text-4xl font-black text-yellow-300 drop-shadow-md">⬅️ 狂點這邊</h2>
            <span class="text-lg text-red-200 mt-2">上方隊伍 (P1)</span>
        </div>
    </div>

    <!-- 中央儀表板 (進度條與計時器) -->
    <div class="h-28 w-full bg-red-950 flex flex-col justify-center px-4 md:px-12 z-10 relative shadow-2xl">
        <!-- 計時器 -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center bg-red-950 px-4 py-1 rounded-full border-2 border-yellow-500/50">
            <span class="text-xs text-yellow-200 uppercase tracking-widest">剩餘時間</span>
            <div id="timer" class="text-4xl font-black text-white leading-none">30</div>
        </div>
        
        <!-- 進度條 -->
        <div class="tug-container w-full max-w-4xl mx-auto h-12">
            <div class="absolute inset-y-0 left-0 w-1/2 bg-gradient-to-r from-red-500 to-red-600 rounded-l-full border-r-2 border-red-900/50"></div>
            <div class="absolute inset-y-0 right-0 w-1/2 bg-gradient-to-l from-orange-500 to-orange-600 rounded-r-full border-l-2 border-red-900/50"></div>
            <div id="coin" class="tug-indicator">🪙</div>
        </div>
    </div>

    <!-- 玩家 2 區域 (下方) -->
    <div id="p2-zone" class="player-zone flex-1 w-full bg-gradient-to-t from-orange-600 to-orange-800 flex flex-col items-center justify-center relative border-t-4 border-yellow-500/50">
        <div class="text-center opacity-80 pointer-events-none flex flex-col items-center">
            <div class="text-7xl mb-2">🐍</div>
            <h2 class="text-4xl font-black text-yellow-300 drop-shadow-md">狂點這邊 ➡️</h2>
            <span class="text-lg text-orange-200 mt-2">下方隊伍 (P2)</span>
        </div>
    </div>

    <script>
        // 遊戲狀態變數
        let position = 50; 
        let gameActive = false;
        let timeLeft = 30;
        let timerInterval;
        
        const coin = document.getElementById('coin');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const timerDisplay = document.getElementById('timer');

        // 綁定防預設行為的觸控與點擊事件
        function setupInputHandlers() {
            const p1Zone = document.getElementById('p1-zone');
            const p2Zone = document.getElementById('p2-zone');

            const handleTap = (player) => (e) => {
                // 阻擋手機雙擊放大、選取等干擾
                if (e.cancelable) e.preventDefault(); 
                tap(player);
            };

            // 使用 { passive: false } 確保 preventDefault 能生效
            p1Zone.addEventListener('touchstart', handleTap(1), { passive: false });
            p1Zone.addEventListener('mousedown', handleTap(1));
            
            p2Zone.addEventListener('touchstart', handleTap(2), { passive: false });
            p2Zone.addEventListener('mousedown', handleTap(2));
        }
        
        setupInputHandlers();

        // 監聽鍵盤事件
        window.addEventListener('keydown', function(e) {
            if (!gameActive) return;
        
        // 點擊力道 (可依需求調整難度)
        const power = 1.5; // 微調力道讓遊戲更持久

        if (player === 1) {
            position -= power;
        } else {
                position += power;
            }

            // 邊界檢查
            if (position <= 0) {
                position = 0;
                endGame('p1');
            } else if (position >= 100) {
                position = 100;
                endGame('p2');
            }

            updateUI();
        }

        function updateUI() {
            // 更新金幣位置
            coin.style.left = `${position}%`;
            
            // 視覺回饋：金幣旋轉
            coin.style.transform = `translate(-50%, -50%) rotate(${(position - 50) * 3.6}deg) scale(1.2)`;
            setTimeout(() => {
                coin.style.transform = `translate(-50%, -50%) rotate(${(position - 50) * 3.6}deg) scale(1)`;
            }, 50);
        }

        function endGame(reason) {
            gameActive = false;
            clearInterval(timerInterval);
            
            let winnerText = "";
            let emoji = "";

            if (reason === 'p1' || (reason === 'timeup' && position < 50)) {
            winnerText = "🎉 上方隊伍 獲勝！ 🎉";
            emoji = "🐉";
        } else if (reason === 'p2' || (reason === 'timeup' && position > 50)) {
            winnerText = "🎉 下方隊伍 獲勝！ 🎉";
            emoji = "🐍";
        } else {
                winnerText = "🤝 勢均力敵，平手！ 🤝";
                emoji = "🧧";
            }

            // 顯示覆蓋層並更新文字
            overlayTitle.innerText = winnerText;
            overlayDesc.innerHTML = `<span class="text-6xl block mb-4">${emoji}</span>太精彩了！是否要再來一局？`;
            overlay.querySelector('button').innerText = "再玩一次";
            overlay.classList.remove('hidden');

            // 慶祝特效
            if (reason !== 'timeup' || position !== 50) {
                createConfetti();
            }
        }

        // 簡單的紙花特效生成器
        function createConfetti() {
            const colors = ['#fbbf24', '#f87171', '#34d399', '#60a5fa', '#ffffff'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
