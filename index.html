<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧨 新年金幣搶奪戰 🧨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #7f1d1d; /* 深紅色背景 */
            overflow: hidden;
            touch-action: manipulation; /* 防止雙擊放大 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* 遊戲主視覺與動畫 */
        .tug-container {
            position: relative;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border: 4px solid #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .tug-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            transition: left 0.1s ease-out;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .player-zone {
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .player-zone:active {
            filter: brightness(1.2);
            transform: scale(0.98);
        }

        /* 煙火特效粒子 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fbbf24;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .pulse-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-white">

    <!-- 開始與結束覆蓋層 -->
    <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm">
        <h1 id="overlay-title" class="text-5xl md:text-7xl font-black text-yellow-400 mb-6 drop-shadow-lg text-center pulse-text">
            🧨 新年金幣搶奪戰 🧨
        </h1>
        <p id="overlay-desc" class="text-xl md:text-2xl text-red-200 mb-10 text-center max-w-lg px-4">
            雙方瘋狂點擊自己的區域，將代表福氣的金幣拉向自己！<br>
            <span class="text-sm md:text-base text-gray-400 mt-2 block">支援觸控點擊，或使用鍵盤 [A] 鍵與 [L] 鍵</span>
        </p>
        <button onclick="startGame()" class="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-red-900 font-black text-3xl py-4 px-12 rounded-full shadow-[0_0_20px_rgba(251,191,36,0.8)] transform transition hover:scale-105 active:scale-95">
            開始對戰
        </button>
    </div>

    <!-- 遊戲資訊列 -->
    <div class="h-20 bg-red-900/50 flex justify-between items-center px-6 md:px-12 border-b-4 border-yellow-500 z-10 relative">
        <div class="text-2xl md:text-4xl font-black text-yellow-300">左方隊伍</div>
        <div class="flex flex-col items-center">
            <span class="text-sm text-yellow-200 uppercase tracking-widest">剩餘時間</span>
            <div id="timer" class="text-3xl md:text-5xl font-black text-white">30</div>
        </div>
        <div class="text-2xl md:text-4xl font-black text-yellow-300">右方隊伍</div>
    </div>

    <!-- 進度條 -->
    <div class="w-full px-10 py-6 bg-red-800 z-10 relative">
        <div class="tug-container">
            <div class="absolute inset-y-0 left-0 w-1/2 bg-red-600 rounded-l-3xl border-r-2 border-red-900/50"></div>
            <div class="absolute inset-y-0 right-0 w-1/2 bg-red-700 rounded-r-3xl border-l-2 border-red-900/50"></div>
            <div id="coin" class="tug-indicator">🪙</div>
        </div>
    </div>

    <!-- 雙人點擊區 -->
    <div class="flex-1 flex w-full relative">
        <!-- 中間分隔線 -->
        <div class="absolute inset-y-0 left-1/2 w-2 bg-yellow-500/30 transform -translate-x-1/2 z-0"></div>

        <!-- 玩家 1 區域 -->
        <div id="p1-zone" class="player-zone w-1/2 h-full bg-gradient-to-br from-red-500 to-red-600 flex items-center justify-center relative border-r-2 border-yellow-500/20" onmousedown="tap(1)" ontouchstart="tap(1)">
            <div class="text-center opacity-50 pointer-events-none">
                <div class="text-6xl mb-4">🐉</div>
                <h2 class="text-3xl font-bold">點擊這裡<br><span class="text-xl">(或按 A 鍵)</span></h2>
            </div>
        </div>

        <!-- 玩家 2 區域 -->
        <div id="p2-zone" class="player-zone w-1/2 h-full bg-gradient-to-bl from-orange-500 to-orange-600 flex items-center justify-center relative border-l-2 border-yellow-500/20" onmousedown="tap(2)" ontouchstart="tap(2)">
            <div class="text-center opacity-50 pointer-events-none">
                <div class="text-6xl mb-4">🐍</div>
                <h2 class="text-3xl font-bold">點擊這裡<br><span class="text-xl">(或按 L 鍵)</span></h2>
            </div>
        </div>
    </div>

    <script>
        // 遊戲狀態變數
        let position = 50; // 0 是 P1 贏，100 是 P2 贏，50 是平手
        let gameActive = false;
        let timeLeft = 30;
        let timerInterval;
        
        const coin = document.getElementById('coin');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const timerDisplay = document.getElementById('timer');

        // 監聽鍵盤事件
        window.addEventListener('keydown', function(e) {
            if (!gameActive) return;
            if (e.key.toLowerCase() === 'a') {
                tap(1);
            } else if (e.key.toLowerCase() === 'l') {
                tap(2);
            }
        });

        function startGame() {
            // 初始化遊戲狀態
            position = 50;
            timeLeft = 30;
            gameActive = true;
            updateUI();
            
            // 隱藏覆蓋層
            overlay.classList.add('hidden');
            
            // 清除之前的紙花
            document.querySelectorAll('.confetti').forEach(e => e.remove());

            // 開始倒數計時
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame('timeup');
                }
            }, 1000);
        }

        function tap(player) {
            if (!gameActive) return;
            
            // 點擊力道 (可依需求調整難度)
            const power = 2; 

            if (player === 1) {
                position -= power;
            } else {
                position += power;
            }

            // 邊界檢查
            if (position <= 0) {
                position = 0;
                endGame('p1');
            } else if (position >= 100) {
                position = 100;
                endGame('p2');
            }

            updateUI();
        }

        function updateUI() {
            // 更新金幣位置
            coin.style.left = `${position}%`;
            
            // 視覺回饋：金幣旋轉
            coin.style.transform = `translate(-50%, -50%) rotate(${(position - 50) * 3.6}deg) scale(1.2)`;
            setTimeout(() => {
                coin.style.transform = `translate(-50%, -50%) rotate(${(position - 50) * 3.6}deg) scale(1)`;
            }, 50);
        }

        function endGame(reason) {
            gameActive = false;
            clearInterval(timerInterval);
            
            let winnerText = "";
            let emoji = "";

            if (reason === 'p1' || (reason === 'timeup' && position < 50)) {
                winnerText = "🎉 左方隊伍 獲勝！ 🎉";
                emoji = "🐉";
            } else if (reason === 'p2' || (reason === 'timeup' && position > 50)) {
                winnerText = "🎉 右方隊伍 獲勝！ 🎉";
                emoji = "🐍";
            } else {
                winnerText = "🤝 勢均力敵，平手！ 🤝";
                emoji = "🧧";
            }

            // 顯示覆蓋層並更新文字
            overlayTitle.innerText = winnerText;
            overlayDesc.innerHTML = `<span class="text-6xl block mb-4">${emoji}</span>太精彩了！是否要再來一局？`;
            overlay.querySelector('button').innerText = "再玩一次";
            overlay.classList.remove('hidden');

            // 慶祝特效
            if (reason !== 'timeup' || position !== 50) {
                createConfetti();
            }
        }

        // 簡單的紙花特效生成器
        function createConfetti() {
            const colors = ['#fbbf24', '#f87171', '#34d399', '#60a5fa', '#ffffff'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
